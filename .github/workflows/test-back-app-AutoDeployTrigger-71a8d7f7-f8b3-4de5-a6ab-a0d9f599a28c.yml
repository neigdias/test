name: Trigger auto deployment for test-back-app

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/test-back-app-AutoDeployTrigger-71a8d7f7-f8b3-4de5-a6ab-a0d9f599a28c.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.TESTBACKAPP_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.TESTBACKAPP_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.TESTBACKAPP_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: 
          registryUsername: ${{ secrets.TESTBACKAPP_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.TESTBACKAPP_REGISTRY_PASSWORD }}
          containerAppName: test-back-app
          resourceGroup: rg-pdv
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


